name: envified
description: >-
  Runtime environment switching for Flutter. Load .env files,
  switch dev/staging/prod at runtime — no rebuild required.
version: 3.2.1
repository: https://github.com/Sam21-39/envified
issue_tracker: https://github.com/Sam21-39/envified/issues
documentation: https://pub.dev/documentation/envified/latest/

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  crypto: ">=3.0.0 <4.0.0"
  flutter_secure_storage: ">=9.0.0 <11.0.0"
  sensors_plus: ">=5.0.0 <8.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <5.0.0"
  mocktail: ">=1.0.0 <2.0.0"

funding:
  - https://paywithchai.in/appamania

topics:
  - environment
  - configuration
  - dotenv
  - debugging
  - sponsorship
