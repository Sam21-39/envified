name: envified
description: >-
  Runtime environment switching for Flutter. Load .env files, switch
  dev/staging/prod/custom at runtime, override base URLs, and lock
  production config — no rebuild required.
version: 0.1.0
homepage: https://appamania.in
repository: https://github.com/Sam21-39/envified
issue_tracker: https://github.com/Sam21-39/envified/issues
documentation: https://pub.dev/documentation/envified/latest/

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

topics:
  - environment
  - configuration
  - dotenv
  - debugging
