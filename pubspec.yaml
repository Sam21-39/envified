name: envified
description: >-
  Runtime environment switching for Flutter. Load .env files,
  switch dev/staging/prod at runtime — no rebuild required.
version: 3.1.0
repository: https://github.com/Sam21-39/envified
issue_tracker: https://github.com/Sam21-39/envified/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

platforms:
  android:
  ios:

dependencies:
  flutter:
    sdk: flutter
  crypto: ">=3.0.0 <4.0.0"
  flutter_secure_storage: ">=9.0.0 <11.0.0"
  meta: ">=1.11.0 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <5.0.0"
  mocktail: ">=1.0.0 <2.0.0"

topics:
  - environment
  - configuration
  - dotenv
  - debugging
