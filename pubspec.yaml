name: envified
description: >-
  Production-grade Flutter environment manager with native AES-256-GCM security.
  Android Keystore / iOS Keychain backed secrets, zero asset-bundle exposure,
  runtime environment switching with adapter-aware lifecycle and CLI tooling.
version: 4.0.0-alpha.1
repository: https://github.com/Sam21-39/envified
issue_tracker: https://github.com/Sam21-39/envified/issues
documentation: https://pub.dev/documentation/envified/latest/

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

platforms:
  android:
  ios:

flutter:
  plugin:
    platforms:
      android:
        package: in.appamania.envified
        pluginClass: EnvifiedPlugin
      ios:
        pluginClass: EnvifiedPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <5.0.0"
  mocktail: ">=1.0.0 <2.0.0"

funding:
  - https://paywithchai.in/appamania

topics:
  - environment
  - configuration
  - security
  - plugin
  - debugging
