name: Flutter Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Obfuscated Android Release
    runs-on: ubuntu-latest
    
    env:
      TARGET_ENV: production
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      BASIC_AUTH_PASSWORD: ${{ secrets.BASIC_AUTH_PASSWORD }}
      APP_AUTH_KEY: ${{ secrets.APP_AUTH_KEY }}
      API_SECRET: ${{ secrets.API_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Create Temporary secrets file safely
        run: |
          printf "ENCRYPTION_KEY=%s\nBASIC_AUTH_PASSWORD=%s\nAPP_AUTH_KEY=%s\nAPI_SECRET=%s\n" \
            "$ENCRYPTION_KEY" \
            "$BASIC_AUTH_PASSWORD" \
            "$APP_AUTH_KEY" \
            "$API_SECRET" > .env.secrets.production
          
          echo "Temp environment secrets file written successfully."

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Standalone CLI secrets generator
        run: dart run envified --env=production

      - name: Build Obfuscated Release APK
        run: |
          cd example
          flutter build apk --release --obfuscate --split-debug-info=../build/app/outputs/symbols

      - name: Clean up temporary secrets (ALWAYS EXECUTES)
        if: always()
        run: |
          if [ -f .env.secrets.production ]; then
            rm -f .env.secrets.production
            echo "Successfully destroyed .env.secrets.production."
          else
            echo "Secrets file already deleted or not found."
          fi
