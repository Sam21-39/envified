name: Flutter Build & Validate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Obfuscated Android Release
    runs-on: ubuntu-latest
    
    env:
      TARGET_ENV: production
      ENVIFIED_MASTER_KEY: ${{ secrets.ENVIFIED_MASTER_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Run envified CLI build (v4 — Phase 2 pending)
        run: |
          echo "ENVIFIED_MASTER_KEY=$ENVIFIED_MASTER_KEY" > .env
          echo "dart run tool/envified_cli/bin/envified.dart build --env=production"
          echo "(Full CLI integration ships in v4.0.0-beta; skipping APK build in alpha.)"

      - name: Build Obfuscated Release APK (Phase 2 — skipped in alpha)
        run: echo "APK build requires encrypted bundles from CLI; enabled in v4.0.0-beta."

      - name: Clean up temporary env file (ALWAYS EXECUTES)
        if: always()
        run: rm -f .env
