name: PR Checks

on:
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check branch name
        run: |
          BRANCH="${{ github.head_ref }}"
          if [[ "$BRANCH" =~ ^(feature|fix|docs|hotfix|release)/ ]] \
             || [[ "$BRANCH" == "develop" ]] \
             || [[ "$BRANCH" == "main" ]]; then
            echo "✅ Branch name valid: $BRANCH"
          else
            echo "❌ Invalid branch: $BRANCH"
            echo "Expected: feature/*, fix/*, hotfix/*, docs/*, release/*, develop, main"
            exit 1
          fi

      - name: Require CHANGELOG update on feature/fix branches
        if: startsWith(github.head_ref, 'feature/') || startsWith(github.head_ref, 'fix/')
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- CHANGELOG.md | grep -q "^+"; then
            echo "✅ CHANGELOG updated"
          else
            echo "❌ CHANGELOG.md must be updated for feature/* and fix/* PRs"
            exit 1
          fi

      - name: Require version bump for release branches
        if: startsWith(github.head_ref, 'release/')
        run: |
          if git diff origin/${{ github.base_ref }}...HEAD -- pubspec.yaml | grep -q "^+version:"; then
            echo "✅ Version bumped in pubspec.yaml"
          else
            echo "❌ pubspec.yaml version must be bumped on release/* branches"
            exit 1
          fi

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mock secrets for static analysis
        run: |
          mkdir -p lib/core/config
          cat << 'EOF' > lib/core/config/secrets.g.dart
          // Mock secrets.g.dart for CI static analysis
          class _SecretValues {
            _SecretValues._();
            static String get encryptionKey => '';
            static String get basicAuthPassword => '';
            static String get appAuthKey => '';
            static String get apiSecret => '';
          }
          class AppSecrets {
            AppSecrets._();
            static final Map<String, String> _secretsMap = {
              'ENCRYPTION_KEY': '',
              'BASIC_AUTH_PASSWORD': '',
              'APP_AUTH_KEY': '',
              'API_SECRET': '',
            };
            static String get(String key) => _secretsMap[key] ?? '';
            static bool contains(String key) => _secretsMap.containsKey(key);
            static String get encryptionKey => '';
            static String get basicAuthPassword => '';
            static String get appAuthKey => '';
            static String get apiSecret => '';
          }
          EOF
          dart format lib/core/config/secrets.g.dart

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test
