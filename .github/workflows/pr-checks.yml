name: PR Checks

on:
  pull_request:
    branches: [main, develop, release/*]
  push:
    branches: [develop, release/*]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Check branch name
        run: |
          BRANCH=${{ github.head_ref }}
          if [[ ! $BRANCH =~ ^(feature|fix|docs|release|hotfix)\/ ]] && [[ $BRANCH != "develop" ]]; then
            echo "❌ Invalid branch name: $BRANCH"
            echo "Use: feature/*, fix/*, hotfix/*, docs/*, or release/*"
            exit 1
          fi
          echo "✅ Branch name valid: $BRANCH"
      
      - name: Check CHANGELOG updated
        run: |
          if git diff origin/develop HEAD -- CHANGELOG.md | grep -q "^[+-]"; then
            echo "✅ CHANGELOG updated"
          else
            echo "⚠️ CHANGELOG not updated (required for feature/fix branches)"
          fi
      
      - name: Check pubspec.yaml version
        run: |
          # Warn if version not bumped
          if ! git diff origin/develop HEAD -- pubspec.yaml | grep -q "version:"; then
            echo "⚠️ Version not bumped in pubspec.yaml"
          fi
      
      - name: Run all checks
        run: |
          flutter pub get
          dart format --output=none --set-exit-if-changed .
          flutter analyze
          flutter test
