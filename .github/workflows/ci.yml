# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: [main, develop, release/*]
  push:
    branches: [develop, release/*]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check branch name
        run: |
          BRANCH=${{ github.head_ref || github.ref_name }}
          if [[ ! $BRANCH =~ ^(feature|fix|docs|release|hotfix)\/ ]] && [[ $BRANCH != "develop" ]] && [[ $BRANCH != "main" ]]; then
            echo "❌ Invalid branch name: $BRANCH"
            echo "Use: feature/*, fix/*, hotfix/*, docs/*, or release/*"
            exit 1
          fi
          echo "✅ Branch name valid: $BRANCH"

      - name: Check coverage threshold
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          lcov --summary coverage/lcov.info | grep "lines" | awk '{print $2}' | \
          awk -F'%' '{if($1 < 80) {print "Coverage below 80%"; exit 1}}'

      - name: Verify pub score prerequisites
        run: dart pub publish --dry-run
