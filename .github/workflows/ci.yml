name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'feature/**', 'fix/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Analyze, format & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true            # subosito/flutter-action built-in cache

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mock secrets for static analysis
        run: |
          mkdir -p lib/core/config
          cat << 'EOF' > lib/core/config/secrets.g.dart
          // Mock secrets.g.dart for CI static analysis
          class _SecretValues {
            _SecretValues._();
            static String get encryptionKey => '';
            static String get basicAuthPassword => '';
            static String get appAuthKey => '';
            static String get apiSecret => '';
          }
          class AppSecrets {
            AppSecrets._();
            static final Map<String, String> _secretsMap = {
              'ENCRYPTION_KEY': '',
              'BASIC_AUTH_PASSWORD': '',
              'APP_AUTH_KEY': '',
              'API_SECRET': '',
            };
            static String get(String key) => _secretsMap[key] ?? '';
            static bool contains(String key) => _secretsMap.containsKey(key);
            static String get encryptionKey => '';
            static String get basicAuthPassword => '';
            static String get appAuthKey => '';
            static String get apiSecret => '';
          }
          EOF

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
