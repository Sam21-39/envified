name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'      # stable: v3.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+-*'    # pre-release: v3.1.0-beta.1

jobs:
  release:
    name: Validate & create GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub release
    
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

      - name: Verify tag matches pubspec version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PUBSPEC_VERSION=$(grep "^version:" pubspec.yaml | awk '{print $2}')
          if [[ "$TAG" != "$PUBSPEC_VERSION" ]]; then
            echo "❌ Tag v$TAG does not match pubspec.yaml version $PUBSPEC_VERSION"
            exit 1
          fi
          echo "✅ Tag matches pubspec: $PUBSPEC_VERSION"

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BODY=$(awk "/^## \[?${VERSION}\]?/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          if [[ -z "$BODY" ]]; then
            BODY="See CHANGELOG.md for details."
          fi
          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish:
    name: Publish to pub.dev
    needs: [release]
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
